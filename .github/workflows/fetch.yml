name: Fetch Always Christmas

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: Fetch Always Christmas
        run: |
          mkdir -p public

          cat > fetch-amazon.js <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          const TARGET_NAME = 'Always Christmas';
          const TARGET_ID = 'amzn1.dv.gti.c443f154-615f-43c5-b61d-8de681dead03';

          function extractNames(text) {
            return [...text.matchAll(/"name"\s*:\s*"([^"]+)"/g)]
              .slice(0, 80)
              .map(m => m[1]);
          }

          function makeUrl(rawUrl, index) {
            const u = new URL(rawUrl);
            u.searchParams.set('startIndex', String(index));
            u.searchParams.set('variant', 'desktopLinux');
            return u.toString();
          }

          (async () => {
            const browser = await chromium.launch({ headless: true });

            const page = await browser.newPage({
              locale: 'en-US',
              viewport: { width: 1440, height: 1200 },
              userAgent: 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/124 Safari/537.36'
            });

            const apiUrls = new Set();
            const debug = [];
            let found = null;

            page.on('response', async (response) => {
              const url = response.url();
              if (!url.includes('/gp/video/api/paginateCollection')) return;

              apiUrls.add(url);

              try {
                const text = await response.text();

                debug.push({
                  source: 'page',
                  url,
                  length: text.length,
                  alwaysChristmas: text.includes(TARGET_NAME),
                  alwaysChristmasId: text.includes(TARGET_ID),
                  names: extractNames(text)
                });

                if (text.includes(TARGET_NAME) || text.includes(TARGET_ID)) {
                  found = text;
                }
              } catch (e) {}
            });

            await page.goto('https://www.amazon.com/gp/video/livetv', {
              waitUntil: 'domcontentloaded',
              timeout: 60000
            });

            await page.waitForTimeout(8000);

            for (let i = 0; i < 30; i++) {
              await page.mouse.wheel(0, 2200);
              await page.waitForTimeout(600);
              if (found) break;
            }

            const urls = [...apiUrls];

            const indexes = [540, 530, 550, 520, 560, 500, 600, 450, 650, 700, 750, 800, 850, 900];

            for (const baseUrl of urls) {
              if (found) break;

              for (const idx of indexes) {
                const testUrl = makeUrl(baseUrl, idx);

                try {
                  const res = await page.request.get(testUrl, {
                    headers: {
                      'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/124 Safari/537.36',
                      'Accept': 'application/json,text/plain,*/*',
                      'Accept-Language': 'en-US,en;q=0.9',
                      'Referer': 'https://www.amazon.com/gp/video/livetv',
                      'Origin': 'https://www.amazon.com'
                    },
                    timeout: 30000
                  });

                  const text = await res.text();

                  const hit = text.includes(TARGET_NAME) || text.includes(TARGET_ID);

                  debug.push({
                    source: 'targeted',
                    startIndex: idx,
                    length: text.length,
                    alwaysChristmas: text.includes(TARGET_NAME),
                    alwaysChristmasId: text.includes(TARGET_ID),
                    names: extractNames(text)
                  });

                  if (hit) {
                    found = text;
                    console.log('FOUND Always Christmas at startIndex=' + idx);
                    break;
                  }
                } catch (e) {}
              }
            }

            fs.writeFileSync('public/amazon-debug.json', JSON.stringify(debug, null, 2));

            await browser.close();

            if (!found) {
              throw new Error('Always Christmas not found. Check public/amazon-debug.json');
            }

            fs.writeFileSync('public/always-christmas.json', found);
          })();
          EOF

          node fetch-amazon.js

      - name: Commit file
        if: always()
        run: |
          git config user.name "epg-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/* || true

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update Always Christmas"
          git push

      - name: Fail if missing
        run: |
          if [ ! -f public/always-christmas.json ]; then
            echo "Always Christmas JSON not created"
            exit 1
          fi

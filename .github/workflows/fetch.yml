name: Fetch Always Christmas

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

            - name: Fetch Always Christmas from Amazon page
        run: |
          mkdir -p public
          cat > fetch-amazon.js <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({
              locale: 'en-US',
              viewport: { width: 1440, height: 1200 },
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124 Safari/537.36'
            });

            let found = null;
            let seen = [];

            page.on('response', async (response) => {
              const url = response.url();
              if (!url.includes('/gp/video/api/paginateCollection')) return;

              try {
                const text = await response.text();

                const names = [...text.matchAll(/"name"\s*:\s*"([^"]+)"/g)]
                  .slice(0, 20)
                  .map(m => m[1]);

                seen.push({
                  url,
                  length: text.length,
                  always: text.includes('Always Christmas'),
                  id: text.includes('amzn1.dv.gti.c443f154-615f-43c5-b61d-8de681dead03'),
                  names
                });

                if (
                  text.includes('Always Christmas') ||
                  text.includes('amzn1.dv.gti.c443f154-615f-43c5-b61d-8de681dead03')
                ) {
                  found = text;
                }
              } catch (e) {}
            });

            await page.goto('https://www.amazon.com/gp/video/livetv', {
              waitUntil: 'domcontentloaded',
              timeout: 60000
            });

            for (let i = 0; i < 30; i++) {
              await page.mouse.wheel(0, 1800);
              await page.waitForTimeout(2000);
              if (found) break;
            }

            await page.waitForTimeout(10000);

            fs.writeFileSync('public/amazon-debug.json', JSON.stringify(seen, null, 2));

            await browser.close();

            if (!found) {
              throw new Error('Always Christmas not found. Saved debug to public/amazon-debug.json');
            }

            fs.writeFileSync('public/always-christmas.json', found);
          })();
          EOF

          node fetch-amazon.js

      - name: Commit file
        run: |
          git config user.name "epg-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/always-christmas.json
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Update Always Christmas EPG"
          git push

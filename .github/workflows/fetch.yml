name: Fetch Always Christmas

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: Fetch Always Christmas
        run: |
          mkdir -p public

          cat > fetch-amazon.js <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          const TARGET_ID = 'amzn1.dv.gti.c443f154-615f-43c5-b61d-8de681dead03';
          const TARGET_NAME = 'Always Christmas';
          const TARGET_LOGO = 'Amazon_Freevee_Always_Christmas';

          function replaceStartIndex(rawUrl, index) {
            if (rawUrl.includes('startIndex=')) {
              return rawUrl.replace(/startIndex=\d+/g, 'startIndex=' + index);
            }
            return rawUrl + '&startIndex=' + index;
          }

          function isHtml(text) {
            const t = text.trim().toLowerCase();
            return t.startsWith('<!doctype') || t.startsWith('<html') || t.includes('<head>');
          }

          function looksLikeJson(text) {
            const t = text.trim();
            return t.startsWith('{') || t.startsWith('[');
          }

          function hit(text) {
            return text.includes(TARGET_ID) || text.includes(TARGET_NAME) || text.includes(TARGET_LOGO);
          }

          function validHit(text) {
            return hit(text) && !isHtml(text) && looksLikeJson(text);
          }

          function extractNames(text) {
            return [...text.matchAll(/"name"\s*:\s*"([^"]+)"/g)].slice(0, 80).map(m => m[1]);
          }

          (async () => {
            const browser = await chromium.launch({ headless: true });

            const page = await browser.newPage({
              locale: 'en-US',
              viewport: { width: 1440, height: 1200 },
              userAgent: 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/124 Safari/537.36'
            });

            const apiUrls = new Set();
            const debug = [];
            let found = null;

            page.on('response', async (response) => {
              const url = response.url();
              if (!url.includes('/gp/video/api/paginateCollection')) return;

              apiUrls.add(url);

              try {
                const text = await response.text();

                debug.push({
                  source: 'page',
                  startIndex: (url.match(/startIndex=(\d+)/) || [null, null])[1],
                  length: text.length,
                  isHtml: isHtml(text),
                  looksLikeJson: looksLikeJson(text),
                  alwaysChristmas: text.includes(TARGET_NAME),
                  alwaysChristmasId: text.includes(TARGET_ID),
                  alwaysChristmasLogo: text.includes(TARGET_LOGO),
                  names: extractNames(text)
                });

                if (validHit(text)) {
                  found = text;
                  console.log('FOUND valid JSON from page response');
                }
              } catch (e) {}
            });

            await page.goto('https://www.amazon.com/gp/video/livetv', {
              waitUntil: 'domcontentloaded',
              timeout: 60000
            });

            await page.waitForTimeout(10000);

            for (let i = 0; i < 140; i++) {
              await page.mouse.wheel(0, 2400);
              await page.waitForTimeout(500);
              if (found) break;
            }

            const urls = [...apiUrls];

            const indexes = [
              800, 850, 900, 950, 1000, 1050, 1100, 1150, 1200,
              540, 550, 560, 570, 580, 590, 600,
              650, 700, 750
            ];

            for (const baseUrl of urls) {
              if (found) break;

              for (const idx of indexes) {
                const testUrl = replaceStartIndex(baseUrl, idx);

                try {
                  const text = await page.evaluate(async (url) => {
                    const res = await fetch(url, {
                      credentials: 'include',
                      headers: {
                        'Accept': 'application/json,text/plain,*/*',
                        'Accept-Language': 'en-US,en;q=0.9'
                      }
                    });
                    return await res.text();
                  }, testUrl);

                  debug.push({
                    source: 'targeted',
                    startIndex: idx,
                    length: text.length,
                    isHtml: isHtml(text),
                    looksLikeJson: looksLikeJson(text),
                    alwaysChristmas: text.includes(TARGET_NAME),
                    alwaysChristmasId: text.includes(TARGET_ID),
                    alwaysChristmasLogo: text.includes(TARGET_LOGO),
                    names: extractNames(text)
                  });

                  if (validHit(text)) {
                    found = text;
                    console.log('FOUND valid Always Christmas JSON at startIndex=' + idx);
                    break;
                  }
                } catch (e) {}
              }
            }

            fs.writeFileSync('public/amazon-debug.json', JSON.stringify(debug, null, 2));

            if (!found) {
              console.log('Always Christmas valid JSON not found this run. Not overwriting always-christmas.json.');
              await browser.close();
              return;
            }

            fs.writeFileSync('public/always-christmas.json', found);
            await browser.close();
          })();
          EOF

          node fetch-amazon.js

      - name: Commit file
        if: always()
        run: |
          git config user.name "epg-bot"
          git config user.email "bot@users.noreply.github.com"

          git add public/* || true

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update Always Christmas"
          git push

      - name: Keep last good file if missing
        run: |
          if [ ! -f public/always-christmas.json ]; then
            echo "No valid Always Christmas JSON found this run."
            echo "Keeping last good always-christmas.json if one already exists."
            exit 0
          fi

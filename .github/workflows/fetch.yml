name: Fetch Always Christmas

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: Fetch Always Christmas
        run: |
          mkdir -p public

          cat > fetch-amazon.js <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          const TARGET_ID = 'amzn1.dv.gti.c443f154-615f-43c5-b61d-8de681dead03';
          const TARGET_NAME = 'Always Christmas';

          function replaceStartIndex(rawUrl, index) {
            if (rawUrl.includes('startIndex=')) {
              return rawUrl.replace(/startIndex=\d+/g, 'startIndex=' + index);
            }
            return rawUrl + '&startIndex=' + index;
          }

          function hit(text) {
            return text.includes(TARGET_ID) ||
              text.includes(TARGET_NAME) ||
              text.includes('Amazon_Freevee_Always_Christmas');
          }

          function extractNames(text) {
            return [...text.matchAll(/"name"\s*:\s*"([^"]+)"/g)]
              .slice(0, 80)
              .map(m => m[1]);
          }

          (async () => {
            const browser = await chromium.launch({ headless: true });

            const page = await browser.newPage({
              locale: 'en-US',
              viewport: { width: 1440, height: 1200 },
              userAgent: 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/124 Safari/537.36'
            });

            const apiUrls = new Set();
            const debug = [];
            let found = null;

            page.on('response', async (response) => {
              const url = response.url();

              if (!url.includes('/gp/video/api/paginateCollection')) {
                return;
              }

              apiUrls.add(url);

              try {
                const text = await response.text();

                debug.push({
                  source: 'page',
                  startIndex: (url.match(/startIndex=(\d+)/) || [null, null])[1],
                  length: text.length,
                  alwaysChristmas: text.includes(TARGET_NAME),
                  alwaysChristmasId: text.includes(TARGET_ID),
                  alwaysChristmasLogo: text.includes('Amazon_Freevee_Always_Christmas'),
                  names: extractNames(text)
                });

                if (hit(text)) {
                  found = text;
                  console.log('FOUND from page response');
                }
              } catch (e) {}
            });

            await page.goto('https://www.amazon.com/gp/video/livetv', {
              waitUntil: 'domcontentloaded',
              timeout: 60000
            });

            await page.waitForTimeout(10000);

            for (let i = 0; i < 100; i++) {
              await page.mouse.wheel(0, 2400);
              await page.waitForTimeout(500);
              if (found) break;
            }

            const urls = [...apiUrls];

            const indexes = [
              540, 542, 530, 550, 520, 560,
              500, 510, 520, 530, 540, 550, 560, 570, 580, 590, 600,
              450, 460, 470, 480, 490,
              610, 620, 630, 640, 650, 660, 670, 680, 690, 700
            ];

            for (const baseUrl of urls) {
              if (found) break;

              for (const idx of indexes) {
                const testUrl = replaceStartIndex(baseUrl, idx);

                try {
                  const text = await page.evaluate(async (url) => {
                    const res = await fetch(url, {
                      credentials: 'include',
                      headers: {
                        'Accept': 'application/json,text/plain,*/*',
                        'Accept-Language': 'en-US,en;q=0.9'
                      }
                    });
                    return await res.text();
                  }, testUrl);

                  const isHit = hit(text);

                  debug.push({
                    source: 'targeted',
                    startIndex: idx,
                    length: text.length,
                    alwaysChristmas: text.includes(TARGET_NAME),
                    alwaysChristmasId: text.includes(TARGET_ID),
                    alwaysChristmasLogo: text.includes('Amazon_Freevee_Always_Christmas'),
                    names: extractNames(text)
                  });

                  if (isHit) {
                    found = text;
                    console.log('FOUND Always Christmas at startIndex=' + idx);
                    break;
                  }
                } catch (e) {}
              }
            }

            fs.writeFileSync('public/amazon-debug.json', JSON.stringify(debug, null, 2));

            await browser.close();

            if (!found) {
              throw new Error('Always Christmas not found. Check public/amazon-debug.json');
            }

            fs.writeFileSync('public/always-christmas.json', found);
          })();
          EOF

          node fetch-amazon.js

      - name: Commit file
        if: always()
        run: |
          git config user.name "epg-bot"
          git config user.email "bot@users.noreply.github.com"

          git add public/* || true

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update Always Christmas"
          git push

      - name: Fail if missing
        run: |
          if [ ! -f public/always-christmas.json ]; then
            echo "Always Christmas JSON not created"
            exit 1
          fi

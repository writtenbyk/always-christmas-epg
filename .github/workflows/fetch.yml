name: Fetch Always Christmas

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: Fetch Always Christmas from Amazon page
        run: |
          mkdir -p public

          cat > fetch-amazon.js <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          const TARGET_NAME = 'Always Christmas';
          const TARGET_ID = 'amzn1.dv.gti.c443f154-615f-43c5-b61d-8de681dead03';

          function withStartIndex(rawUrl, index) {
            const u = new URL(rawUrl);
            u.searchParams.set('startIndex', String(index));
            return u.toString();
          }

          function extractNames(text) {
            return [...text.matchAll(/"name"\s*:\s*"([^"]+)"/g)]
              .slice(0, 40)
              .map(m => m[1]);
          }

          (async () => {
            const browser = await chromium.launch({ headless: true });

            const page = await browser.newPage({
              locale: 'en-US',
              viewport: { width: 1440, height: 1200 },
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124 Safari/537.36'
            });

            const apiUrls = new Set();
            const debug = [];
            let found = null;

            page.on('response', async (response) => {
              const url = response.url();
              if (!url.includes('/gp/video/api/paginateCollection')) return;
              apiUrls.add(url);

              try {
                const text = await response.text();
                const hit = text.includes(TARGET_NAME) || text.includes(TARGET_ID);

                debug.push({
                  source: 'page',
                  url,
                  length: text.length,
                  alwaysChristmas: text.includes(TARGET_NAME),
                  alwaysChristmasId: text.includes(TARGET_ID),
                  names: extractNames(text)
                });

                if (hit && !found) {
                  found = text;
                  console.log('FOUND from page response');
                }
              } catch (e) {}
            });

            await page.goto('https://www.amazon.com/gp/video/livetv', {
              waitUntil: 'domcontentloaded',
              timeout: 60000
            });

            await page.waitForTimeout(8000);

            for (let i = 0; i < 80; i++) {
              await page.mouse.wheel(0, 2200);
              await page.waitForTimeout(700);
              if (found) break;
            }

            await page.waitForTimeout(5000);

            const urls = [...apiUrls];

            for (const baseUrl of urls) {
              if (found) break;

              for (let idx = 0; idx <= 900; idx += 10) {
                const testUrl = withStartIndex(baseUrl, idx);

                try {
                  const res = await page.request.get(testUrl, {
                    headers: {
                      'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124 Safari/537.36',
                      'Accept': 'application/json,text/plain,*/*',
                      'Accept-Language': 'en-US,en;q=0.9',
                      'Referer': 'https://www.amazon.com/gp/video/livetv',
                      'Origin': 'https://www.amazon.com'
                    },
                    timeout: 30000
                  });

                  const text = await res.text();
                  const hit = text.includes(TARGET_NAME) || text.includes(TARGET_ID);

                  if (idx % 50 === 0 || hit) {
                    debug.push({
                      source: 'bruteforce',
                      startIndex: idx,
                      length: text.length,
                      alwaysChristmas: text.includes(TARGET_NAME),
                      alwaysChristmasId: text.includes(TARGET_ID),
                      names: extractNames(text)
                    });
                  }

                  if (hit) {
                    found = text;
                    console.log('FOUND from brute force startIndex=' + idx);
                    break;
                  }
                } catch (e) {}
              }
            }

            fs.writeFileSync('public/amazon-debug.json', JSON.stringify(debug, null, 2));

            await browser.close();

            if (!found) {
              throw new Error('Always Christmas not found. Check public/amazon-debug.json');
            }

            fs.writeFileSync('public/always-christmas.json', found);
          })();
          EOF

          node fetch-amazon.js

      - name: Commit file
        if: always()
        run: |
          git config user.name "epg-bot"
          git config user.email "bot@users.noreply.github.com"

          git add public/* || true

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update Always Christmas"
          git push

      - name: Fail if missing
        run: |
          if [ ! -f public/always-christmas.json ]; then
            echo "Always Christmas JSON not created"
            exit 1
          fi
